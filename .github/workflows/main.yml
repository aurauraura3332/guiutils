name: Build GUI Utils Mod

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Java 8
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "8"

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Setup Decompile Workspace
        run: ./gradlew setupDecompWorkspace --no-daemon
        env:
          GRADLE_OPTS: "-Xmx2g"

      - name: Build
        run: ./gradlew build --no-daemon
        env:
          GRADLE_OPTS: "-Xmx2g"

      - name: Upload JAR
        uses: actions/upload-artifact@v3
        with:
          name: guiutils-mod
          path: build/libs/*.jar
          if-no-files-found: error
